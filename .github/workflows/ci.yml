name: CI Workflow
on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Modern version for current git standards

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Must be setup-node, not checkout
        with:
          node-version: '20' # Matches your local Node.js version
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci # Better for CI than 'npm install'

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm test